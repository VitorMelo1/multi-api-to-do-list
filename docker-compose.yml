services:
  postgres:
    image: postgres:16-alpine
    container_name: todo-distributed-db
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo_secret
      POSTGRES_DB: todo_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
